syntax = "proto3";

option java_multiple_files = true;
option java_package = "ru.bmstu.iu3.grpc";
option java_outer_classname = "ReferenceProto";

package reference;

service ReferenceService {
  rpc GetMenu (MenuRequest) returns (MenuResponse);
  rpc GetDishByNumber (DishRequest) returns (DishResponse);
}

message MenuRequest {
}

message DishRequest {
  int32 number = 1;
}

message DishMessage {
  int32 number = 1;
  string name = 2;
  int32 price = 3;
  string description = 4;
}

message MenuResponse {
  repeated DishMessage dishes = 1;
}

message DishResponse {
  DishMessage dish = 1;
}
